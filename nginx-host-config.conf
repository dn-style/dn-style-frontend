# CONFIGURACIÓN PARA NGINX HOST (test.system4us.com)
# Optimizada para Cloudflare y evitar redirecciones de barras

server {
    listen 80;
    server_name test.system4us.com;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # --- RUTAS DE WORDPRESS (PROTEGIDAS) ---
    location /wp-admin {
        auth_basic "Acceso Restringido - Administracion";
        auth_basic_user_file ./htpasswd;
        proxy_pass http://localhost:8086;
    }

    # Permitir admin-ajax.php sin auth básica para que el frontend funcione
    location /wp-admin/admin-ajax.php {
        auth_basic off;
        proxy_pass http://localhost:8086;
    }

    location /wp-login.php {
        auth_basic "Acceso Restringido - Administracion";
        auth_basic_user_file /mnt/beleriand/codigo/dn-style-frontend/.htpasswd;
        proxy_pass http://localhost:8086;
    }

    location /wp-content {
        proxy_pass http://localhost:8086;
    }

    location /wp-includes {
        proxy_pass http://localhost:8086;
    }

    location /wp-json {
        proxy_pass http://localhost:8086;
    }

    # --- RUTAS DEL BACKEND API ---
    location /wc { proxy_pass http://localhost:4000; }
    location /auth { proxy_pass http://localhost:4000; }
    location /orders { proxy_pass http://localhost:4000; }
    location /webhooks { proxy_pass http://localhost:4000; }
    location /checkout { proxy_pass http://localhost:4000; }
    # --- PROTECCIÓN ESTRICTA DE COMPROBANTES ---
    location ~* /images/receipts/ {
        proxy_pass http://localhost:4000;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header X-Debug-Source "Nginx-Host-Receipts" always;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /images { 
        # Cacheo normal para el resto de las imágenes
        expires 1y;
        add_header Cache-Control "public";
        proxy_pass http://localhost:4000; 
    }
    location /socket.io { proxy_pass http://localhost:4000; }

    # --- FRONTEND (REACT) ---
    location / {
        proxy_pass http://localhost:3010;
    }
}