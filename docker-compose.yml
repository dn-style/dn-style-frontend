services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network

  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    restart: always
    ports:
      - "8086:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress_password
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
            $$_SERVER['HTTPS'] = 'on';
        }
        $$protocol = (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') ? 'https' : 'http';
        if (isset($$_SERVER['HTTP_HOST'])) {
            define('WP_HOME', $$protocol . '://' . $$_SERVER['HTTP_HOST']);
            define('WP_SITEURL', $$protocol . '://' . $$_SERVER['HTTP_HOST']);
        }
        define('CONCATENATE_SCRIPTS', false);
        define('JWT_AUTH_CORS_ENABLE', true);
        define('WP_DEBUG', false);
    volumes:
      - wp_data:/var/www/html
      - ./back/auth-bridge.php:/var/www/html/auth-bridge.php
    networks:
      - app-network

  wp-cli:
    image: wordpress:cli
    user: root
    volumes:
      - wp_data:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress_password
      WORDPRESS_DB_NAME: wordpress
    depends_on:
      - db
      - wordpress
    networks:
      - app-network

  backend:
    build: ./back
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4000:4000"
    env_file: ./back/.env
    environment:
      NODE_ENV: development
      WP_HOST: http://wordpress
      WC_BASE: http://wordpress/
      REDIS_URL: redis://redis:6379
      VERBOSE_DEBUG: true
    volumes:
      - frontend_dist:/app/public_html:ro
      - wp_data:/app/wp_uploads:ro
    depends_on:
      - wordpress
      - redis
    networks:
      - app-network

  frontend:
    build: .
    restart: always
    ports:
      - "3010:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html
    command: /bin/sh -c "echo 'Refreshing frontend assets...' && cp -rf /app/build_backup/. /usr/share/nginx/html/ && nginx -g 'daemon off;'"
    depends_on:
      - backend
    networks:
      - app-network

  minio:
    image: minio/minio
    restart: always
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network

  mc:
    image: minio/mc
    depends_on:
      - minio
    volumes:
      - wp_data:/wp_data:ro
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo '...waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/products;
      /usr/bin/mc anonymous set public local/products;
      echo ' Sincronizando media inicial...';
      /usr/bin/mc mirror --overwrite /wp_data/wp-content/uploads local/products/uploads;
      echo ' Media sincronizada.';
      exit 0;
      "
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  wp_data:
  frontend_dist:
  minio_data:
