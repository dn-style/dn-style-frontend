<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: 'Inter', Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fcfcfc;
      color: #1a1a1a;
    }

    .wrapper {
      width: 100%;
      padding: 40px 0;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff;
      padding: 50px;
      border: 1px solid #eeeeee;
      border-radius: 24px;
      border-top: 6px solid #ef4444;
    }

    .logo {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.05em;
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      text-align: center;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #666666;
      text-align: center;
    }

    .status-badge {
      display: block;
      width: fit-content;
      margin: 20px auto;
      background: #fef2f2;
      color: #b91c1c;
      padding: 8px 20px;
      rounded-full;
      font-weight: 900;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 50px;
    }

    .footer {
      margin-top: 50px;
      text-align: center;
      font-size: 11px;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="container">
      <div class="logo">
        <img src="https://dnshop.com.ar/wp-content/uploads/2026/03/logodnstyle.png" alt="DN shop"
          style="height: 100px; width: auto; display: block; margin: 0 auto;">
      </div>
      <div class="status-badge">Orden Cancelada</div>
      <h1>Pedido Cancelado</h1>
      <p>Hola Jose Perez, te informamos que tu pedido <b>#998877</b> ha sido cancelado.</p>
      <p>Si crees que esto es un error o deseas realizar una nueva compra, por favor contáctanos por WhatsApp.</p>

      <div class="footer">
        DN shop STORE &copy; 2026 | BUENOS AIRES, ARGENTINA
      </div>
    </div>
  </div>
</body>

</html>
