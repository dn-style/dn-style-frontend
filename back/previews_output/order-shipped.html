<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      border-left: 5px solid #25D366;
    }

    .tracking-box {
      background-color: #f0f0f0;
      padding: 20px;
      text-align: center;
      border-radius: 5px;
      margin: 20px 0;
    }

    .tracking-code {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div style="text-align: center; margin-bottom: 30px;">
      <img src="https://dnshop.com.ar/wp-content/uploads/2026/03/logodnstyle.png" alt="DN shop"
        style="height: 100px; width: auto; display: block; margin: 0 auto;">
    </div>
    <h2>¡Tu pedido está en camino! 🚚</h2>
    <p>Hola Jose Perez,</p>
    <p>Buenas noticias. Tu pedido <strong>#998877</strong> ha sido despachado y está en ruta hacia tu dirección.</p>

    <div class="tracking-box">
      <p>Tu número de seguimiento:</p>
      <div class="tracking-code">AR-123456789-DN</div>
      <br />
      <a href="https://dnshop.com.ar/tracking/AR-123456789-DN" style="color: #007cba; text-decoration: none;">Seguir
        envío</a>
    </div>

    <p>Gracias por confiar en DN shop Store.</p>
  </div>
</body>

</html>
